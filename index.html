<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MathPlay">
  <meta name="format-detection" content="telephone=no">

  <title>MathPlay 🕐 时间小冒险</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 主舞台:横屏时显示 -->
  <main class="stage">

    <!-- 顶部小标题 + 重置按钮 -->
    <header class="page-header">
      <h1 class="title-small">
        <span class="title-text">MathPlay</span>
        <span class="title-icon">🕐</span>
      </h1>
      <button class="btn-reset" id="btn-reset" type="button">
        🔄 换个时间
      </button>
    </header>

    <!-- 钟表区 -->
    <div class="clock-wrapper">

      <div class="clock">
        <!-- 卡通脸:眼睛 + 笑脸(在指针下方) -->
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
        <div class="smile"></div>

        <!-- 12 个数字,沿圆周分布 -->
        <div class="number n12">12</div>
        <div class="number n1">1</div>
        <div class="number n2">2</div>
        <div class="number n3">3</div>
        <div class="number n4">4</div>
        <div class="number n5">5</div>
        <div class="number n6">6</div>
        <div class="number n7">7</div>
        <div class="number n8">8</div>
        <div class="number n9">9</div>
        <div class="number n10">10</div>
        <div class="number n11">11</div>

        <!-- 指针(Step 2 固定在 12 点位置) -->
        <div class="hand hand-hour"></div>
        <div class="hand hand-minute"></div>

        <!-- 中心圆点(盖住指针根部) -->
        <div class="center-cap"></div>
      </div>

      <!-- 数字时间标签(JS 实时更新) -->
      <div class="time-label" id="time-label">12:00</div>

      <!-- 提示 -->
      <p class="hint-text">💡 用手指拖动分针(细的那根),看时针怎么自己跟着动</p>

    </div>

  </main>

  <!-- JS:让钟表"活"起来 -->
  <script src="script.js"></script>

  <!-- 竖屏提示:仅竖屏时显示 -->
  <div class="rotate-hint" aria-hidden="true">
    <div class="rotate-icon">🔄</div>
    <p class="rotate-text">请把 iPad 横过来玩</p>
  </div>

</body>
</html>
